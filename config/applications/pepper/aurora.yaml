# Pepper application configuration for Aurora
# Pepper: Portable Engine for the Production of Parton-level Event Records
# https://spice-mc.gitlab.io/pepper/
#
# Uses the new v2 installation structure in /soft/applications/hep/pepper
# Built with build_pepper_v2.sh which installs Kokkos, HDF5, LHAPDF, FORM, and Pepper
#
# Directory structure:
#   /soft/applications/hep/pepper/
#   ├── src/<package>/           # source checkouts
#   ├── build/<pkg>/<ver>/<build>/  # build artifacts
#   ├── install/<pkg>/<ver>/<build>/  # installed files (each has setup.sh)
#   ├── logs/<pkg>/<ver>/<build>/  # build logs
#   └── env/                     # combined environment scripts

# Installation base path
pepper_install_base: "/soft/applications/hep/pepper"

# Combined environment setup script (sources all dependencies)
# Use "latest.sh" symlink or specific version file
pepper_env_script: "/soft/applications/hep/pepper/env/latest.sh"

# Modules to load (only used if pepper_env_script is not set)
modules:
  - "kokkos"   # Required - Pepper uses Kokkos for GPU portability
  - "cmake"    # Used for compilation, helpful for runtime

# Note: Script automatically runs "module use /soft/modulefiles" before loading

# MPI configuration
mpi:
  command: "mpiexec"
  flags: []  # --depth and --cpu-bind are added automatically by template

# Environment variables for Intel GPU support
environment:
  # ZE_AFFINITY_MASK is set dynamically by GPU affinity wrapper
  # MPICH_GPU_SUPPORT_ENABLED: "1"  # Uncomment if needed for GPU-aware MPI

# Default job settings
defaults:
  walltime: "00:30:00"
  queue: "debug"
  # pepper_executable is found via PATH after sourcing env script

# GPU configuration notes:
# Aurora nodes have 6 Intel Data Center GPU Max 1550 GPUs
# Each GPU has 2 tiles, giving 12 total GPU tiles per node
#
# Recommended configuration for Pepper:
#   - 6 MPI ranks per node (1 per GPU)
#   - GPU affinity set via ZE_AFFINITY_MASK using PALS_LOCAL_RANKID
#   - This simpler approach works well and avoids tile-level complexity
#
# The application automatically handles GPU affinity via wrapper script.

# Version information (for reference)
# These versions are determined by the installation and can be overridden
versions:
  pepper: "1.9.2"
  kokkos: "4.7.00"
  hdf5: "1_14_3"
  lhapdf: "kokkos_version"
  form: "v4.3.1"
